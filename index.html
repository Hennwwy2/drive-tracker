<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Drive Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="shared.css">
  <style>
    .home-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      min-height: calc(100dvh - 70px);
    }

    .app-logo {
      width: 80px;
      height: 80px;
      background: #e94560;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 16px;
    }

    .app-title {
      font-size: 28px;
      font-weight: 800;
      color: #e94560;
      margin-bottom: 6px;
    }

    .app-subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
    }

    .home-cards {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .home-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #16213e;
      border-radius: 12px;
      padding: 18px 20px;
      text-decoration: none;
      color: #e0e0e0;
      transition: background 0.2s;
    }

    .home-card:hover {
      background: #1a2a4e;
    }

    .card-icon {
      font-size: 28px;
      width: 50px;
      height: 50px;
      background: #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-text h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .card-text p {
      font-size: 12px;
      color: #888;
    }

    .status-badges {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: #16213e;
      border-radius: 20px;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="home-content">
    <div class="app-logo">&#9678;</div>
    <div class="app-title">Drive Tracker</div>
    <div class="app-subtitle">Predict location between updates</div>

    <div class="home-cards">
      <a href="tracker.html" class="home-card">
        <div class="card-icon">&#9737;</div>
        <div class="card-text">
          <h3>Tracker</h3>
          <p>Map, route, and live location tracking</p>
        </div>
      </a>
      <a href="route-setup.html" class="home-card">
        <div class="card-icon">&#9881;</div>
        <div class="card-text">
          <h3>Route Setup</h3>
          <p>Set start/end addresses and saved locations</p>
        </div>
      </a>
      <a href="settings.html" class="home-card">
        <div class="card-icon">&#9881;</div>
        <div class="card-text">
          <h3>Settings</h3>
          <p>API keys, Firebase, and app config</p>
        </div>
      </a>
    </div>

    <div class="status-badges">
      <div class="badge" id="badge-ors">
        <span class="status-dot offline"></span> ORS
      </div>
      <div class="badge" id="badge-firebase">
        <span class="status-dot offline"></span> Firebase
      </div>
      <div class="badge" id="badge-route">
        <span class="status-dot offline"></span> Route
      </div>
    </div>
  </div>

  <!-- Nav Bar -->
  <nav class="nav-bar">
    <a href="index.html" class="nav-item active">
      <span class="nav-icon">&#8962;</span>
      Home
    </a>
    <a href="tracker.html" class="nav-item">
      <span class="nav-icon">&#9737;</span>
      Tracker
    </a>
    <a href="route-setup.html" class="nav-item">
      <span class="nav-icon">&#9881;</span>
      Route
    </a>
    <a href="settings.html" class="nav-item">
      <span class="nav-icon">&#9881;</span>
      Settings
    </a>
  </nav>

  <script>
    // Update status badges based on localStorage
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('ors-api-key')) {
        document.querySelector('#badge-ors .status-dot').classList.replace('offline', 'online');
      }
      if (localStorage.getItem('firebase-config')) {
        document.querySelector('#badge-firebase .status-dot').classList.replace('offline', 'online');
      }
      if (localStorage.getItem('active-route')) {
        document.querySelector('#badge-route .status-dot').classList.replace('offline', 'online');
      }

      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
      }
    });
  </script>
</body>
</html>
