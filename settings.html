<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Settings — Drive Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="page-header">
    <h1>Settings</h1>
  </div>

  <div class="page-content">
    <!-- ORS API Key -->
    <div class="section">
      <div class="section-title">OpenRouteService</div>
      <div class="input-group">
        <label for="ors-key">API Key</label>
        <input type="text" id="ors-key" placeholder="Paste your free ORS API key">
      </div>
      <button onclick="saveOrsKey()">Save API Key</button>
      <div id="ors-status" class="status-line"></div>
    </div>

    <!-- Firebase -->
    <div class="section">
      <div class="section-title">Firebase Realtime Database</div>
      <div class="input-group">
        <label for="firebase-url">Database URL</label>
        <input type="text" id="firebase-url" placeholder="https://your-project.firebaseio.com">
      </div>
      <div class="input-group">
        <label for="firebase-api-key">API Key</label>
        <input type="text" id="firebase-api-key" placeholder="Your Firebase API key">
      </div>
      <button onclick="saveFirebase()">Save & Connect Firebase</button>
      <div id="firebase-status" class="status-line"></div>
    </div>

    <!-- Transfer Settings -->
    <div class="section">
      <div class="section-title">Transfer to Another Device</div>
      <p style="font-size: 12px; color: #888; margin-bottom: 10px;">Generate a link with all your settings baked in. Open it on your phone to auto-load everything.</p>
      <button onclick="generateTransferLink()">Generate Transfer Link</button>
      <div id="transfer-output" class="hidden" style="margin-top: 10px;">
        <input type="text" id="transfer-link" readonly style="font-size: 12px; background: #0f3460;">
        <button onclick="copyTransferLink()" style="margin-top: 6px;" class="btn-secondary">Copy Link</button>
      </div>
      <div id="transfer-status" class="status-line"></div>
    </div>

    <!-- Clear Data -->
    <div class="section">
      <div class="section-title">Data</div>
      <button class="btn-secondary" onclick="clearRoute()">Clear Active Route</button>
      <button class="btn-secondary" style="margin-top: 8px;" onclick="clearAll()">Clear All Saved Data</button>
      <div id="clear-status" class="status-line"></div>
    </div>
  </div>

  <!-- Nav Bar -->
  <nav class="nav-bar">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">&#8962;</span>
      Home
    </a>
    <a href="tracker.html" class="nav-item">
      <span class="nav-icon">&#9737;</span>
      Tracker
    </a>
    <a href="route-setup.html" class="nav-item">
      <span class="nav-icon">&#9881;</span>
      Route
    </a>
    <a href="settings.html" class="nav-item active">
      <span class="nav-icon">&#9881;</span>
      Settings
    </a>
  </nav>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Check for incoming transfer config in URL hash
      importFromURL();

      // Restore saved values
      const orsKey = localStorage.getItem('ors-api-key');
      if (orsKey) document.getElementById('ors-key').value = orsKey;

      const fbConfig = localStorage.getItem('firebase-config');
      if (fbConfig) {
        const config = JSON.parse(fbConfig);
        if (config.databaseURL) document.getElementById('firebase-url').value = config.databaseURL;
        if (config.apiKey && config.apiKey !== 'dummy') document.getElementById('firebase-api-key').value = config.apiKey;
      }
    });

    function saveOrsKey() {
      const key = document.getElementById('ors-key').value.trim();
      if (!key) {
        showStatus('ors-status', 'Please enter an API key.', true);
        return;
      }
      localStorage.setItem('ors-api-key', key);
      showStatus('ors-status', 'API key saved!');
    }

    function saveFirebase() {
      const dbUrl = document.getElementById('firebase-url').value.trim();
      const apiKey = document.getElementById('firebase-api-key').value.trim();
      if (!dbUrl) {
        showStatus('firebase-status', 'Please enter the database URL.', true);
        return;
      }
      const config = { apiKey: apiKey || 'dummy', databaseURL: dbUrl };
      localStorage.setItem('firebase-config', JSON.stringify(config));
      showStatus('firebase-status', 'Firebase config saved! It will connect on the Tracker page.');
    }

    function clearRoute() {
      localStorage.removeItem('active-route');
      showStatus('clear-status', 'Active route cleared.');
    }

    function clearAll() {
      if (confirm('This will remove all saved data including API keys, addresses, and routes. Continue?')) {
        localStorage.clear();
        document.getElementById('ors-key').value = '';
        document.getElementById('firebase-url').value = '';
        document.getElementById('firebase-api-key').value = '';
        showStatus('clear-status', 'All data cleared.');
      }
    }

    // --- Transfer ---
    function generateTransferLink() {
      const data = {};
      const orsKey = localStorage.getItem('ors-api-key');
      const fbConfig = localStorage.getItem('firebase-config');
      const savedAddr = localStorage.getItem('saved-addresses');

      if (orsKey) data.o = orsKey;
      if (fbConfig) data.f = fbConfig;
      if (savedAddr) data.a = savedAddr;

      if (!Object.keys(data).length) {
        showStatus('transfer-status', 'Nothing to transfer. Save your settings first.', true);
        return;
      }

      const encoded = btoa(JSON.stringify(data));
      const baseUrl = window.location.origin + window.location.pathname;
      const link = `${baseUrl}?import=${encodeURIComponent(encoded)}`;

      document.getElementById('transfer-link').value = link;
      document.getElementById('transfer-output').classList.remove('hidden');
      showStatus('transfer-status', 'Link generated! Copy it and open on your phone.');
    }

    function copyTransferLink() {
      const link = document.getElementById('transfer-link').value;
      navigator.clipboard.writeText(link).then(() => {
        showStatus('transfer-status', 'Copied to clipboard!');
      }).catch(() => {
        // Fallback: select the text
        document.getElementById('transfer-link').select();
        showStatus('transfer-status', 'Select all and copy manually.');
      });
    }

    function importFromURL() {
      const params = new URLSearchParams(window.location.search);
      const importData = params.get('import');
      if (!importData) return;

      try {
        const data = JSON.parse(atob(decodeURIComponent(importData)));
        let count = 0;

        if (data.o) { localStorage.setItem('ors-api-key', data.o); count++; }
        if (data.f) { localStorage.setItem('firebase-config', data.f); count++; }
        if (data.a) { localStorage.setItem('saved-addresses', data.a); count++; }

        // Clean URL
        window.history.replaceState({}, '', window.location.pathname);

        showStatus('transfer-status', `Imported ${count} setting(s) from link! You're all set.`);
      } catch (err) {
        showStatus('transfer-status', 'Invalid transfer link.', true);
      }
    }

    function showStatus(id, msg, isError) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.color = isError ? '#e94560' : '#4caf50';
    }
  </script>
</body>
</html>
